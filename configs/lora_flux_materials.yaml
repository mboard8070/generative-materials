# LoRA training config for Flux text-to-material
# Using ai-toolkit / diffusers format

job: extension
config:
  name: "flux-materials-lora"
  process:
    - type: "sd_trainer"
      
      # Base model
      training_folder: "output/flux-materials"
      device: "cuda:0"
      
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: true  # 8-bit quantization to fit in VRAM
        
      # Dataset
      datasets:
        - folder_path: "data/training"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 512]
          
      # Training params
      train:
        batch_size: 1
        gradient_accumulation_steps: 4
        gradient_checkpointing: true
        
        train_unet: true
        train_text_encoder: false
        
        # LoRA config
        network_type: "lora"
        network_dim: 16  # LoRA rank
        network_alpha: 16
        
        # Learning rate
        lr: 1e-4
        unet_lr: 1e-4
        lr_scheduler: "cosine"
        lr_warmup_steps: 100
        
        # Steps
        steps: 1500
        save_every: 500
        
        # Optimizer
        optimizer: "adamw8bit"
        max_grad_norm: 1.0
        
      # Sampling during training
      sample:
        sampler: "euler"
        sample_every: 250
        width: 512
        height: 512
        prompts:
          - "seamless tileable PBR texture of rusty weathered metal, game texture, photorealistic material, top-down view, even lighting"
          - "seamless tileable PBR texture of polished oak wood floor, game texture, photorealistic material, top-down view, even lighting"
          - "seamless tileable PBR texture of rough grey concrete, game texture, photorealistic material, top-down view, even lighting"
        seed: 42
        guidance_scale: 3.5
        num_inference_steps: 28

# Trigger word (optional - helps model recognize material requests)
trigger_word: "pbrtex"
